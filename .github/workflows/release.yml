name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: dmage-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: dmage-macos-aarch64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: dmage-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: dmage-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/dmage"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dmage-*
          generate_release_notes: true

  latest:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          name: Latest build
          body: "Автоматическая сборка из main. Скачай бинарник для своей платформы."
          files: dmage-*
          make_latest: false
