name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      is_new: ${{ steps.check.outputs.is_new }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if version needs release
        id: check
        run: |
          VERSION=$(grep '^version' dmage/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping release"
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v${VERSION} — will release"
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    if: needs.version.outputs.is_new == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: dmage-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: dmage-macos-aarch64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: dmage-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: dmage-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/dmage"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create tag
        run: |
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version.outputs.version }}"
          files: dmage-*
          generate_release_notes: true

  homebrew:
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          SHA_ARM=$(sha256sum dmage-macos-aarch64 | cut -d' ' -f1)
          SHA_X86=$(sha256sum dmage-macos-x86_64 | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum dmage-linux-x86_64 | cut -d' ' -f1)

          cat > dotmage.rb << FORMULA
          class Dotmage < Formula
            desc "E2E-encrypted .env secret manager"
            homepage "https://github.com/dotMage/dotmage"
            version "${VERSION}"
            license "AGPL-3.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/dotMage/dotmage/releases/download/v#{version}/dmage-macos-aarch64"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/dotMage/dotmage/releases/download/v#{version}/dmage-macos-x86_64"
                sha256 "${SHA_X86}"
              end
            end

            on_linux do
              url "https://github.com/dotMage/dotmage/releases/download/v#{version}/dmage-linux-x86_64"
              sha256 "${SHA_LINUX}"
            end

            def install
              binary = Dir["dmage-*"].first || "dmage"
              bin.install binary => "dmage"
            end

            test do
              assert_match "dotMage", shell_output("#{bin}/dmage help")
            end
          end
          FORMULA

          # Push to homebrew tap
          git clone https://x-access-token:${GH_TOKEN}@github.com/dotMage/homebrew.git tap
          cp dotmage.rb tap/Formula/dotmage.rb
          cd tap
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "dotmage ${VERSION}" || exit 0
          git push
