name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: dmage-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: dmage-macos-aarch64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: dmage-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: dmage-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/dmage"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dmage-*
          generate_release_notes: true

  homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM=$(sha256sum dmage-macos-aarch64 | cut -d' ' -f1)
          SHA_X86=$(sha256sum dmage-macos-x86_64 | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum dmage-linux-x86_64 | cut -d' ' -f1)

          cat > dotmage.rb << FORMULA
          class Dotmage < Formula
            desc "E2E-encrypted .env secret manager"
            homepage "https://github.com/dotMage/dotmage"
            version "${VERSION}"
            license "AGPL-3.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/dotMage/dotmage/releases/download/v#{version}/dmage-macos-aarch64"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/dotMage/dotmage/releases/download/v#{version}/dmage-macos-x86_64"
                sha256 "${SHA_X86}"
              end
            end

            on_linux do
              url "https://github.com/dotMage/dotmage/releases/download/v#{version}/dmage-linux-x86_64"
              sha256 "${SHA_LINUX}"
            end

            def install
              binary = Dir["dmage-*"].first || "dmage"
              bin.install binary => "dmage"
            end

            test do
              assert_match "dotMage", shell_output("#{bin}/dmage help")
            end
          end
          FORMULA

          # Push to homebrew tap
          git clone https://x-access-token:${GH_TOKEN}@github.com/dotMage/homebrew.git tap
          cp dotmage.rb tap/Formula/dotmage.rb
          cd tap
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "dotmage ${VERSION}" || exit 0
          git push

  latest:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          name: Latest build
          body: "Автоматическая сборка из main. Скачай бинарник для своей платформы."
          files: dmage-*
          make_latest: false
